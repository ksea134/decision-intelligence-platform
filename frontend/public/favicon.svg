<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- DIPファビコン / スタイル: Kyndryl Red / 背景: ダーク→レッド / 用途: ブラウザタブ favicon -->
  <!-- dip-favicon-kyndryl-red-32.svg の背景をダーク→レッドグラデーションに変更したバージョン -->
  <!-- 16x16〜32x32 対応: "D" 1文字で視認性確保 -->
  <defs>
    <linearGradient id="dark-to-red-kr" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#E2231A"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="5" fill="url(#dark-to-red-kr)"/>
  <text
    x="16" y="17"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="#FFFFFF"
  >D</text>
</svg>
