<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- DIPファビコン / 背景: ダークグラデーション（コントラスト強め） / 用途: ブラウザタブ favicon -->
  <!-- 16x16〜32x32 対応: "D" 1文字で視認性確保 -->
  <defs>
    <linearGradient id="dark-gradient-strong" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#444441"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="5" fill="url(#dark-gradient-strong)"/>
  <text
    x="16" y="17"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="#E2231A"
  >D</text>
</svg>
