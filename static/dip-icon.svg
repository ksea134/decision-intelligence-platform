<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 80 80">
  <!-- DIP通常アイコン / スタイル: Solid Dark / 背景: ダークグラデーション（コントラスト強め） / 用途: アプリアイコン・OGP等 -->
  <defs>
    <linearGradient id="dark-gradient-strong" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#444441"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="12" fill="url(#dark-gradient-strong)"/>
  <text
    x="40" y="40"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#E2231A"
    letter-spacing="2"
  >DIP</text>
</svg>
